<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña | Reverzo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <img src="logo.png" alt="Reverzo Logo" class="logo" id="logo-img">
                <h1>Restablecer contraseña</h1>
                <p>Ingresa tu nueva contraseña para acceder a tu cuenta.</p>
            </div>

            <form id="reset-form">
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="tu@email.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Nueva contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" id="toggle-p1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="eye-icon">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirmar contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirm-password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" id="toggle-p2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="eye-icon">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submit-btn">
                    <span>Actualizar contraseña</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>

            <div id="message" class="message"></div>

            <div id="success-state" class="success-state" style="display: none;">
                <div class="success-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </div>
                <h2>¡Todo listo!</h2>
                <p>Tu contraseña ha sido actualizada correctamente. Ya puedes volver a la aplicación e iniciar sesión.
                </p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
